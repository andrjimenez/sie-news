<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIE News Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:        #00155a;
            --navy-mid:    #002080;
            --navy-light:  #0a2db3;
            --accent:      #e8f0fe;
            --accent-bright: #4f7cff;
            --white:       #ffffff;
            --off-white:   #f7f8fc;
            --gray-100:    #f0f2f8;
            --gray-200:    #e2e6f0;
            --gray-400:    #8892b0;
            --gray-600:    #4a5580;
            --gray-800:    #1e2340;
            --text:        #0d1126;
            --red:         #e53935;
            --orange:      #f57c00;
            --green:       #2e7d32;
            --font-sans:   'IBM Plex Sans', sans-serif;
            --font-mono:   'IBM Plex Mono', monospace;
            --radius-sm:   4px;
            --radius-md:   8px;
            --radius-lg:   12px;
            --shadow-sm:   0 1px 3px rgba(0,21,90,0.08), 0 1px 2px rgba(0,21,90,0.06);
            --shadow-md:   0 4px 12px rgba(0,21,90,0.10), 0 2px 4px rgba(0,21,90,0.06);
            --shadow-lg:   0 8px 24px rgba(0,21,90,0.12), 0 4px 8px rgba(0,21,90,0.08);
            --transition:  150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-sans); background: var(--off-white); color: var(--text); min-height: 100vh; }

        .page-wrapper { max-width: 1600px; margin: 0 auto; padding: 0 2rem 4rem; }

        .site-header {
            background: var(--navy);
            margin: 0 -2rem;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            gap: 2rem;
        }

        .brand { display: flex; flex-direction: column; gap: 2px; }
        .brand-name { font-family: var(--font-sans); font-weight: 700; font-size: 1.15rem; color: var(--white); letter-spacing: 0.01em; }
        .brand-sub { font-size: 0.78rem; color: rgba(255,255,255,0.5); font-family: var(--font-sans); font-weight: 400; }

        .header-controls { display: flex; align-items: center; gap: 1rem; }

        .status-pill {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px; padding: 0.3rem 0.75rem;
            font-family: var(--font-mono); font-size: 0.7rem; color: rgba(255,255,255,0.6); white-space: nowrap;
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
        .status-dot.loading { background: var(--orange); animation: blink 1s ease infinite; }
        .status-dot.error { background: var(--red); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .timestamp { font-family: var(--font-mono); font-size: 0.7rem; color: rgba(255,255,255,0.35); white-space: nowrap; }

        .toolbar { display: flex; align-items: center; gap: 0.75rem; padding: 1.5rem 0 1.25rem; flex-wrap: wrap; }
        .toolbar-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-400); white-space: nowrap; }
        .filter-tabs { display: flex; gap: 0.375rem; flex-wrap: wrap; }

        .filter-tab {
            font-family: var(--font-sans); font-size: 0.8rem; font-weight: 500;
            padding: 0.4rem 0.9rem; border-radius: 999px;
            border: 1.5px solid var(--gray-200); background: var(--white); color: var(--gray-600);
            cursor: pointer; transition: all var(--transition); white-space: nowrap;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .filter-tab:hover { border-color: var(--navy-light); color: var(--navy-mid); }
        .filter-tab.active { background: var(--navy-mid); border-color: var(--navy-mid); color: var(--white); }

        .filter-tab .tab-count {
            font-family: var(--font-mono); font-size: 0.65rem;
            background: rgba(255,255,255,0.2); border-radius: 999px;
            padding: 0 0.35rem; line-height: 1.6; min-width: 18px; text-align: center; display: none;
        }
        .filter-tab.active .tab-count, .filter-tab .tab-count.has-count { display: inline; }

        .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }

        .btn-refresh {
            font-family: var(--font-sans); font-size: 0.8rem; font-weight: 600;
            padding: 0.45rem 1rem; border-radius: var(--radius-sm);
            border: 1.5px solid var(--navy-mid); background: var(--navy-mid); color: var(--white);
            cursor: pointer; transition: all var(--transition);
            display: flex; align-items: center; gap: 0.4rem; letter-spacing: 0.02em;
        }
        .btn-refresh:hover:not(:disabled) { background: var(--navy); border-color: var(--navy); }
        .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-refresh .icon { display: inline-block; font-size: 1rem; line-height: 1; }
        .btn-refresh.spinning .icon { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner {
            background: #fff3cd; border: 1px solid #f0c040; color: #7a5000;
            padding: 0.75rem 1rem; border-radius: var(--radius-md);
            font-size: 0.85rem; margin-bottom: 1.25rem; display: none;
        }
        .error-banner.visible { display: block; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; align-items: start; }

        .category-card {
            background: var(--white); border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg); overflow: hidden;
            box-shadow: var(--shadow-sm); transition: box-shadow var(--transition);
        }
        .category-card:hover { box-shadow: var(--shadow-md); }
        .category-card.hidden { display: none; }

        .card-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-100);
            display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem;
        }
        .card-header-left { flex: 1; min-width: 0; }
        .card-category-label { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--navy-light); margin-bottom: 0.25rem; }
        .card-title { font-size: 1rem; font-weight: 600; color: var(--gray-800); line-height: 1.3; }
        .card-focus { font-size: 0.72rem; color: var(--gray-400); margin-top: 0.2rem; font-style: italic; }

        .card-badge {
            flex-shrink: 0; background: var(--navy); color: var(--white);
            font-family: var(--font-mono); font-size: 0.65rem; font-weight: 600;
            border-radius: 999px; padding: 0.2rem 0.55rem; min-width: 28px; text-align: center; line-height: 1.8;
        }
        .card-badge.loading-badge { background: var(--gray-200); color: var(--gray-400); animation: blink 1.2s ease infinite; }

        .article-list { max-height: 680px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--gray-200) transparent; }
        .article-list::-webkit-scrollbar { width: 4px; }
        .article-list::-webkit-scrollbar-track { background: transparent; }
        .article-list::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 999px; }

        .article-item { padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-100); transition: background var(--transition); }
        .article-item:last-child { border-bottom: none; }
        .article-item:hover { background: var(--gray-100); }

        .article-meta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
        .article-source { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 600; color: var(--navy-light); letter-spacing: 0.03em; }
        .meta-sep { color: var(--gray-200); font-size: 0.65rem; }
        .article-date { font-family: var(--font-mono); font-size: 0.65rem; color: var(--gray-400); }

        .article-title { display: block; font-size: 0.95rem; font-weight: 600; color: var(--text); line-height: 1.45; text-decoration: none; margin-bottom: 0.5rem; transition: color var(--transition); }
        .article-title:hover { color: var(--navy-light); }

        .article-excerpt { font-size: 0.83rem; color: var(--gray-600); line-height: 1.55; margin-bottom: 0.6rem; }

        .insight-box { background: var(--accent); border-left: 3px solid var(--navy-light); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 0.55rem 0.75rem; margin-bottom: 0.6rem; }
        .insight-label { font-family: var(--font-mono); font-size: 0.6rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--navy-mid); margin-bottom: 0.2rem; }
        .insight-text { font-size: 0.83rem; color: var(--gray-800); line-height: 1.5; font-style: italic; }
        .insight-loading { font-size: 0.75rem; color: var(--gray-400); font-style: italic; animation: blink 1.5s ease infinite; }

        .article-link { font-family: var(--font-mono); font-size: 0.68rem; color: var(--navy-light); text-decoration: none; font-weight: 600; letter-spacing: 0.02em; transition: color var(--transition); }
        .article-link:hover { color: var(--navy); text-decoration: underline; }

        .skeleton-item { padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-100); }
        .skeleton-item:last-child { border-bottom: none; }
        .skeleton-line { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%); background-size: 200% 100%; border-radius: var(--radius-sm); animation: shimmer 1.4s ease infinite; margin-bottom: 0.5rem; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-line.s-short  { height: 10px; width: 35%; }
        .skeleton-line.s-title  { height: 14px; width: 90%; margin-bottom: 0.35rem; }
        .skeleton-line.s-title2 { height: 14px; width: 70%; margin-bottom: 0.6rem; }
        .skeleton-line.s-body   { height: 10px; width: 100%; }
        .skeleton-line.s-body2  { height: 10px; width: 85%; }
        .skeleton-line.s-body3  { height: 10px; width: 60%; margin-bottom: 0; }

        .empty-state { padding: 2.5rem 1.25rem; text-align: center; color: var(--gray-400); font-size: 0.82rem; }
        .empty-state svg { width: 32px; height: 32px; stroke: var(--gray-200); margin-bottom: 0.75rem; display: block; margin-left: auto; margin-right: auto; }

        @media (max-width: 768px) {
            .page-wrapper { padding: 0 1rem 3rem; }
            .site-header { margin: 0 -1rem; padding: 0 1rem; }
            .timestamp { display: none; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .toolbar { gap: 0.5rem; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <span class="brand-name">SIE · News Dashboard</span>
                <span class="brand-sub">Sony Interactive Entertainment</span>
            </div>
            <div class="header-controls">
                <span class="timestamp" id="timestamp"></span>
                <div class="status-pill">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">Ready</span>
                </div>
            </div>
        </div>
    </header>

    <div class="page-wrapper">
        <div class="toolbar">
            <span class="toolbar-label">Filter</span>
            <div class="filter-tabs" id="filter-tabs">
                <button class="filter-tab active" data-filter="">All <span class="tab-count" id="count-all"></span></button>
                <button class="filter-tab" data-filter="hardware">Hardware <span class="tab-count" id="count-hardware"></span></button>
                <button class="filter-tab" data-filter="games">Games <span class="tab-count" id="count-games"></span></button>
                <button class="filter-tab" data-filter="network">Network &amp; PS+ <span class="tab-count" id="count-network"></span></button>
                <button class="filter-tab" data-filter="corporate">Corporate <span class="tab-count" id="count-corporate"></span></button>
                <button class="filter-tab" data-filter="industry">Industry <span class="tab-count" id="count-industry"></span></button>
            </div>
            <div class="toolbar-right">
                <button class="btn-refresh" id="refresh-btn">
                    <span class="icon">⟳</span>
                    Refresh
                </button>
            </div>
        </div>
        <div class="error-banner" id="error-banner"></div>
        <div class="dashboard-grid" id="dashboard-grid"></div>
    </div>

    <script>
    const NEWS_API_KEY = '49f62eab61c1478086ac707012433080';
    const CACHE_KEY    = 'sie_dashboard_cache';
    const CACHE_TTL_MS = 30 * 60 * 1000;
    const PROXIES = ['https://api.allorigins.win/get?url=', 'https://corsproxy.io/?'];

    const CATEGORIES = {
        hardware:  { label: 'Hardware',      description: 'Console Hardware, Devices & Technology',   focus: 'PS5, PS5 Pro, DualSense, console specs, hardware sales' },
        games:     { label: 'Games',         description: 'SIE Exclusive Titles, Studios & Launches', focus: 'SIE exclusives, first-party studios, game launches, gameplay' },
        network:   { label: 'Network & PS+', description: 'PlayStation Plus & Online Services',       focus: 'PS+ tiers, subscribers, PSN, online infrastructure' },
        corporate: { label: 'Corporate',     description: 'Earnings, M&A, Legal & Leadership',        focus: 'Financial results, acquisitions, legal, partnerships, executive news' },
        industry:  { label: 'Industry',      description: 'Gaming Industry & Competitive Landscape',  focus: 'Xbox, Nintendo, market trends, publisher moves, gaming industry news' }
    };

    const CORPORATE_SIGNALS = [
        'earnings','quarterly results','financial results','annual report',
        'revenue','profit','operating loss','net income','operating income',
        'fiscal year','fiscal quarter','guidance','forecast','valuation',
        'stock price','share price','investor','shareholder','ipo','buyout',
        'acquisition','acquires','acquired','merger','takeover',
        'layoff','layoffs','job cuts','redundancies','restructuring','reorg',
        'class action','antitrust','litigation','settlement agreement',
        'regulatory fine','pay $','pay million','pay billion',
        'playstation store fine','playstation store settlement',
        'impairment charge','write-down','writedown',
        'ceo','chief executive','chief financial officer','cfo',
        'chairman','appointed as','steps down','resigns as','named president',
        'strategic partnership','strategic alliance','licensing agreement',
        'joint venture','multi-year deal','content deal',
        'bungie','haven studios','insomniac games','naughty dog',
        'santa monica studio','guerrilla games','sucker punch','media molecule',
        'firesprite','bluepoint','housemarque','nixxes',
        'marathon','bungie impairment','studio closure','game cancelled','concord shutdown'
    ];

    const HARDWARE_SIGNALS = ['ps5 pro','playstation 5','ps5 console','ps5 slim','dualsense','playstation vr','psvr2','psvr 2','console hardware','console specs','console sales','console price','playstation hardware','sony console','ps5 price','playstation price','ps5 stock','playstation stock','ps5 availability','ssd speed','ray tracing','teraflop','ps5 review','ps5 update','ps5 drm','playstation drm','ps5 offline','playstation 6','ps6','next gen playstation','next-gen console sony'];

    const NETWORK_SIGNALS = ['playstation plus','ps plus','ps+ ','playstation network','psn outage','psn down','playstation now','ps now','playstation subscription','ps+ subscribers','playstation online','online service playstation','cloud gaming playstation','playstation streaming'];

    const GAMES_SIGNALS = ['playstation exclusive','ps5 exclusive','sony exclusive','first-party game','first party game','playstation studios','sony santa monica','naughty dog','insomniac','guerrilla games','sucker punch','housemarque','bluepoint','media molecule','god of war','spider-man','horizon','the last of us','ghost of tsushima','gran turismo','ratchet and clank','sackboy','returnal',"demon's souls",'astro bot','helldivers','until dawn','concord','fairgame','marathon game','lego horizon','playstation game','sony game','ps5 game','ps4 game','game reveal','game trailer','game preview','game review','game launch playstation','release playstation','gameplay playstation','new playstation','playstation release','sony release','playstation title','sony title','playstation launch','ps5 new game','sony new game'];

    const INDUSTRY_SIGNALS = ['xbox','game pass','microsoft gaming','activision','bethesda','nintendo switch','nintendo direct','switch 2','gaming market','video game industry','gaming revenue','games industry','steam deck','valve','epic games','epic store','take-two','rockstar','ea games','electronic arts','ubisoft','square enix','capcom','sega','bandai namco','konami','game developers conference','gdc','summer game fest','the game awards','gaming stocks','gaming acquisitions','publisher'];

    const assignCategory = article => {
        const t = `${article.title} ${article.description || ''}`.toLowerCase();
        if (CORPORATE_SIGNALS.some(k => t.includes(k))) return 'corporate';
        if (HARDWARE_SIGNALS.some(k => t.includes(k)))  return 'hardware';
        if (NETWORK_SIGNALS.some(k => t.includes(k)))   return 'network';
        if (GAMES_SIGNALS.some(k => t.includes(k)))     return 'games';
        if (INDUSTRY_SIGNALS.some(k => t.includes(k)))  return 'industry';
        return null;
    };

    const SEARCH_QUERIES = [
        { category: 'corporate', q: 'Sony Interactive Entertainment financial earnings quarterly results' },
        { category: 'corporate', q: 'Sony PlayStation acquisition lawsuit settlement fine antitrust' },
        { category: 'corporate', q: 'Sony Bungie impairment charge write-down loss Marathon' },
        { category: 'corporate', q: 'Sony PlayStation layoff restructure job cuts' },
        { category: 'corporate', q: 'Sony gaming revenue profit fiscal year' },
        { category: 'hardware',  q: 'PlayStation 5 PS5 console hardware sales' },
        { category: 'hardware',  q: 'PS5 Pro DualSense specs performance price' },
        { category: 'hardware',  q: 'PlayStation 6 PS6 next gen Sony console' },
        { category: 'games',     q: 'PlayStation exclusive game release 2025' },
        { category: 'games',     q: 'Sony PlayStation first party game studio announcement' },
        { category: 'games',     q: 'God of War Horizon Spider-Man PlayStation game' },
        { category: 'games',     q: 'Naughty Dog Insomniac Guerrilla new game' },
        { category: 'network',   q: 'PlayStation Plus PS+ subscription tier Sony' },
        { category: 'network',   q: 'PlayStation Network PSN online service' },
        { category: 'network',   q: 'PlayStation Plus subscribers growth monthly games' },
        { category: 'industry',  q: 'Xbox Game Pass Microsoft gaming news' },
        { category: 'industry',  q: 'Nintendo Switch 2 gaming industry news' },
        { category: 'industry',  q: 'video game industry market trends publisher 2025' }
    ];

    const BLOCKED_SOURCES   = ['alltoc','the sun','dailystar','dailymail','attack of the fanboy','wegotthiscovered','givemesport','sportskeeda','talkesport','clutchpoints','fansided','ninja journalism'];
    const PREFERRED_SOURCES = ['bbc','reuters','bloomberg','financial times','wall street journal','the verge','ign','gamesindustry','eurogamer','polygon','kotaku','wired','techcrunch','engadget','nytimes','guardian','wsj','forbes','gamespot','pcgamer','arstechnica','gamesradar','vgc','videogameschronicle','gamerant','dualshockers','gamingbolt','thegamer','screenrant'];

    const isReputableSource = a => { const s=(a.source?.name||'').toLowerCase(),u=(a.url||'').toLowerCase(); return !BLOCKED_SOURCES.some(b=>s.includes(b)||u.includes(b)); };
    const sourceScore = a => PREFERRED_SOURCES.some(p=>(a.source?.name||'').toLowerCase().includes(p)) ? 1 : 0;

    const SONY_TERMS = ['sony','playstation','ps5','ps4','psn','sie','ps plus','playstation plus','playstation studios','bungie','insomniac','naughty dog','santa monica','guerrilla','sucker punch','housemarque','bluepoint'];
    const isSonyRelevant = (a, cat) => { if (cat==='industry') return true; const t=`${a.title} ${a.description||''}`.toLowerCase(); return SONY_TERMS.some(x=>t.includes(x)); };

    const fingerprintTitle = t => { const stop=new Set(['a','an','the','and','or','but','in','on','at','to','for','of','with','by','from','is','are','was','were','has','have','had','its','it','this','that','as','be','been','will','would','could','should','may','might','about','after','before','into','over','under','then','when','where','how','all','both','each','more','most','other','some','such','no','not','only','same','so','than','too','very','just','also','what','know','says','said']); return new Set(t.toLowerCase().replace(/[^a-z0-9 ]/g,'').split(' ').filter(w=>w.length>3&&!stop.has(w))); };
    const extractAmounts = t => (t.match(/\$[\d]+(?:\.[\d]+)?(?:m|b|million|billion)?/gi)||[]).map(n=>n.replace(/[mb]/i,'').toLowerCase());
    const extractTopicSigs = t => { const s=[],l=t.toLowerCase(); if(l.includes('price')&&(l.includes('drop')||l.includes('cut')||l.includes('reduc')||l.includes('lower')||l.includes('cheaper')))s.push('price_change'); const m=l.match(/(\d+)\s*(million|billion)\s*(units|consoles|sold|shipped)/); if(m)s.push('sales_'+m[1]+m[2]); return s; };
    const isSameStory = (a,b) => { const aA=extractAmounts(a),aB=extractAmounts(b); if(aA.length&&aB.length&&aA.some(x=>aB.includes(x)))return true; const sA=extractTopicSigs(a),sB=extractTopicSigs(b); if(sA.length&&sB.length&&sA.some(x=>sB.includes(x)))return true; const wA=fingerprintTitle(a),wB=fingerprintTitle(b); if(!wA.size||!wB.size)return false; return [...wA].filter(w=>wB.has(w)).length/Math.min(wA.size,wB.size)>=0.45; };

    const saveCache = d => { try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(),data:d})); } catch(e){} };
    const loadCache = () => { try { const r=sessionStorage.getItem(CACHE_KEY); if(!r)return null; const {ts,data}=JSON.parse(r); return Date.now()-ts>CACHE_TTL_MS?null:data; } catch(e){return null;} };

    const fetchWithTimeout = (url,opts={},ms=10000) => { const c=new AbortController(),t=setTimeout(()=>c.abort(),ms); return fetch(url,{...opts,signal:c.signal}).then(r=>{clearTimeout(t);return r;}).catch(e=>{clearTimeout(t);throw e;}); };

    const fetchWithProxy = async (url, idx=0) => {
        if (idx>=PROXIES.length) throw new Error('All proxies failed');
        try {
            const res = await fetchWithTimeout(PROXIES[idx]+encodeURIComponent(url),{},10000);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const d = await res.json();
            return d.contents ? JSON.parse(d.contents) : d;
        } catch(e) { console.warn(`Proxy ${idx} failed:`,e.message); return fetchWithProxy(url,idx+1); }
    };

    const fetchOneQuery = async q => {
        const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(q)}&sortBy=publishedAt&language=en&pageSize=100&apiKey=${NEWS_API_KEY}`;
        try { const d=await fetchWithProxy(url); return d.status==='error'?[]:(d.articles||[]); } catch(e){return[];}
    };

    const generateInsights = async (articles, label, context) => {
        if (!articles.length) return articles;
        const prompt = `You are a strategic analyst for a consulting team advising Sony Interactive Entertainment (SIE).\n\nFor each article, write ONE concise sentence explaining why it matters to SIE's ${label} business.\nBe specific — ground the insight in what the article is actually about. No generic statements.\nContext: ${context}\n\nArticles:\n${articles.map((a,i)=>`[${i}] TITLE: ${a.title}\nEXCERPT: ${a.excerpt}`).join('\n\n')}\n\nRespond ONLY with a JSON array: [{"index":0,"insight":"..."},...]\nNo markdown. No preamble. JSON only.`;
        try {
            const res = await fetchWithTimeout('https://corsproxy.io/?'+encodeURIComponent('https://api.anthropic.com/v1/messages'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})},15000);
            const d=await res.json(), txt=d.content?.[0]?.text||'[]', results=JSON.parse(txt.replace(/```json|```/g,'').trim());
            return articles.map((a,i)=>({...a,insight:results.find(r=>r.index===i)?.insight||null}));
        } catch(e) { console.warn('Insight generation failed:',e.message); return articles.map(a=>({...a,insight:null})); }
    };

    let currentFilter='', allArticles={};

    const setStatus = (text,type='ready') => { document.getElementById('status-text').textContent=text; document.getElementById('status-dot').className=`status-dot${type==='loading'?' loading':type==='error'?' error':''}`; };
    const showError = msg => { const el=document.getElementById('error-banner'); el.textContent=msg; el.classList.toggle('visible',!!msg); };
    const formatDate = ds => { try { const d=new Date(ds),now=new Date(),m=Math.floor((now-d)/60000),h=Math.floor(m/60),day=Math.floor(h/24); if(m<1)return'just now'; if(m<60)return`${m}m ago`; if(h<24)return`${h}h ago`; if(day<7)return`${day}d ago`; return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); } catch(e){return'';} };
    const updateTimestamp = () => { document.getElementById('timestamp').textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); };

    const updateCounts = () => {
        const total=Object.values(allArticles).reduce((s,a)=>s+a.length,0);
        const el=document.getElementById('count-all'); el.textContent=total; el.classList.toggle('has-count',total>0);
        Object.keys(CATEGORIES).forEach(k=>{ const e=document.getElementById(`count-${k}`); if(!e)return; const n=(allArticles[k]||[]).length; e.textContent=n; e.classList.toggle('has-count',n>0); });
    };

    const renderSkeletons = () => {
        document.getElementById('dashboard-grid').innerHTML = Object.keys(CATEGORIES).map(k=>`
            <div class="category-card" data-category="${k}">
                <div class="card-header"><div class="card-header-left"><div class="card-category-label">${CATEGORIES[k].label}</div><div class="card-title">${CATEGORIES[k].description}</div><div class="card-focus">${CATEGORIES[k].focus}</div></div><div class="card-badge loading-badge">—</div></div>
                <div class="article-list">${[1,2,3].map(()=>`<div class="skeleton-item"><div class="skeleton-line s-short"></div><div class="skeleton-line s-title"></div><div class="skeleton-line s-title2"></div><div class="skeleton-line s-body"></div><div class="skeleton-line s-body2"></div><div class="skeleton-line s-body3"></div></div>`).join('')}</div>
            </div>`).join('');
    };

    const renderArticles = (loadingInsights=false) => {
        document.getElementById('dashboard-grid').innerHTML = Object.keys(CATEGORIES).map(k => {
            const cat=CATEGORIES[k], items=allArticles[k]||[], visible=currentFilter===''||currentFilter===k;
            const body = items.length===0
                ? `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z"/></svg>No articles found</div>`
                : items.map(a => {
                    const ins = loadingInsights
                        ? `<div class="insight-box"><div class="insight-label">Why it Matters</div><div class="insight-loading">Generating insight…</div></div>`
                        : a.insight ? `<div class="insight-box"><div class="insight-label">Why it Matters</div><div class="insight-text">${a.insight}</div></div>` : '';
                    return `<div class="article-item"><div class="article-meta"><span class="article-source">${a.source}</span><span class="meta-sep">·</span><span class="article-date">${a.date}</span></div><a class="article-title" href="${a.url}" target="_blank" rel="noopener noreferrer">${a.title}</a><p class="article-excerpt">${a.excerpt.substring(0,160)}${a.excerpt.length>160?'…':''}</p>${ins}<a class="article-link" href="${a.url}" target="_blank" rel="noopener noreferrer">Read full article →</a></div>`;
                }).join('');
            return `<div class="category-card${visible?'':' hidden'}" data-category="${k}"><div class="card-header"><div class="card-header-left"><div class="card-category-label">${cat.label}</div><div class="card-title">${cat.description}</div><div class="card-focus">${cat.focus}</div></div><div class="card-badge">${items.length}</div></div><div class="article-list">${body}</div></div>`;
        }).join('');
    };

    const applyFilter = filter => {
        currentFilter=filter;
        document.querySelectorAll('.filter-tab').forEach(b=>b.classList.toggle('active',b.dataset.filter===filter));
        document.querySelectorAll('.category-card[data-category]').forEach(c=>c.classList.toggle('hidden',filter!==''&&c.dataset.category!==filter));
    };

    const refreshNews = async (forceRefresh=false) => {
        const btn=document.getElementById('refresh-btn');
        btn.disabled=true; btn.classList.add('spinning');
        setStatus('Fetching…','loading'); showError('');

        if (!forceRefresh) {
            const cached=loadCache();
            if (cached) { allArticles=cached; renderArticles(false); updateCounts(); applyFilter(currentFilter); updateTimestamp(); setStatus('Ready','ready'); btn.disabled=false; btn.classList.remove('spinning'); return; }
        }

        try {
            renderSkeletons();
            const results = await Promise.allSettled(SEARCH_QUERIES.map(({q})=>fetchOneQuery(q)));
            const seenUrls=new Set(), seenTitles=[], rawPool=[];

            results.forEach((res,i) => {
                if (res.status!=='fulfilled') return;
                const cat=SEARCH_QUERIES[i].category;
                for (const a of res.value) {
                    if (!a.url||seenUrls.has(a.url)) continue;
                    if (!isSonyRelevant(a,cat)) continue;
                    if (!isReputableSource(a)) continue;
                    if (seenTitles.some(t=>isSameStory(t,a.title))) continue;
                    seenUrls.add(a.url); seenTitles.push(a.title); rawPool.push(a);
                }
            });

            rawPool.sort((a,b)=>sourceScore(b)-sourceScore(a));
            const categorized=Object.fromEntries(Object.keys(CATEGORIES).map(k=>[k,[]]));

            for (const a of rawPool) {
                const cat=assignCategory(a);
                if (cat&&categorized[cat].length<8) {
                    categorized[cat].push({title:a.title,source:a.source.name,date:formatDate(a.publishedAt),excerpt:a.description||'No description available',url:a.url,insight:null});
                }
            }

            if (!Object.values(categorized).some(a=>a.length>0)) { showError('No articles found. Please try refreshing again.'); setStatus('Error','error'); btn.disabled=false; btn.classList.remove('spinning'); return; }

            allArticles=categorized; renderArticles(true); updateCounts(); applyFilter(currentFilter); updateTimestamp(); setStatus('Generating insights…','loading');

            const contextMap = { hardware:'PS5/PS5 Pro hardware, DualSense, console specs, sales and lifecycle', games:'SIE exclusive titles, first-party studios, game launches', network:'PlayStation Plus tiers, PSN services, subscriber growth', corporate:'SIE earnings, M&A, legal matters, executive leadership, partnerships', industry:'Competitive gaming landscape: Xbox, Nintendo, market trends, publisher moves' };

            await Promise.allSettled(Object.keys(categorized).map(async k => {
                if (!categorized[k].length) return;
                categorized[k]=await generateInsights(categorized[k],CATEGORIES[k].label,contextMap[k]);
            }));

            allArticles=categorized; saveCache(categorized); renderArticles(false); updateCounts(); applyFilter(currentFilter); setStatus('Ready','ready');

        } catch(err) { console.error(err); showError(`Error: ${err.message}`); setStatus('Error','error');
        } finally { btn.disabled=false; btn.classList.remove('spinning'); }
    };

    window.addEventListener('DOMContentLoaded', () => {
        const btn=document.getElementById('refresh-btn');
        const tabs=document.getElementById('filter-tabs');
        if (!btn) { console.error('refresh-btn not found'); return; }
        if (!tabs) { console.error('filter-tabs not found'); return; }
        btn.addEventListener('click', () => { console.log('Refresh clicked'); refreshNews(true); });
        tabs.addEventListener('click', e => { const tab=e.target.closest('.filter-tab'); if (tab) applyFilter(tab.dataset.filter); });
        refreshNews(false);
    });

    setInterval(()=>refreshNews(true), 30*60*1000);
    </script>
</body>
</html>
