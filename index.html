<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony Interactive Entertainment - Consultant Insights Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 3px solid #000080;
        }
        
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #000080;
            letter-spacing: -0.5px;
        }
        
        .header p {
            color: #666666;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .header .subtitle {
            color: #999999;
            font-size: 0.9rem;
            font-style: italic;
        }
        
        .last-updated {
            font-size: 0.85rem;
            color: #999999;
            margin-top: 0.5rem;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        
        .control-group {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        
        .control-group label {
            font-size: 0.95rem;
            color: #333333;
            font-weight: 500;
        }
        
        select, button {
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            border: 1.5px solid #000080;
            border-radius: 4px;
            background: #ffffff;
            color: #000080;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        select:hover, button:hover {
            background: #000080;
            color: #ffffff;
        }
        
        select:focus, button:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 0, 128, 0.1);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: #666666;
            margin-left: auto;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
        }
        
        .status-dot.loading {
            background: #FF9800;
            animation: pulse 1s infinite;
        }
        
        .status-dot.error {
            background: #F44336;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }
        
        .category-card {
            background: #f8f8f8;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

            transform
