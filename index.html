<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIE News Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ─── DESIGN TOKENS ─────────────────────────────────────── */
        :root {
            --navy:        #00155a;
            --navy-mid:    #002080;
            --navy-light:  #0a2db3;
            --accent:      #e8f0fe;
            --accent-bright: #4f7cff;
            --white:       #ffffff;
            --off-white:   #f7f8fc;
            --gray-100:    #f0f2f8;
            --gray-200:    #e2e6f0;
            --gray-400:    #8892b0;
            --gray-600:    #4a5580;
            --gray-800:    #1e2340;
            --text:        #0d1126;
            --red:         #e53935;
            --orange:      #f57c00;
            --green:       #2e7d32;

            --font-sans:   'IBM Plex Sans', sans-serif;
            --font-mono:   'IBM Plex Mono', monospace;

            --radius-sm:   4px;
            --radius-md:   8px;
            --radius-lg:   12px;
            --shadow-sm:   0 1px 3px rgba(0,21,90,0.08), 0 1px 2px rgba(0,21,90,0.06);
            --shadow-md:   0 4px 12px rgba(0,21,90,0.10), 0 2px 4px rgba(0,21,90,0.06);
            --shadow-lg:   0 8px 24px rgba(0,21,90,0.12), 0 4px 8px rgba(0,21,90,0.08);
            --transition:  150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font-sans);
            background: var(--off-white);
            color: var(--text);
            min-height: 100vh;
        }

        .page-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .site-header {
            background: var(--navy);
            margin: 0 -2rem;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            gap: 2rem;
        }

        .brand { display: flex; flex-direction: column; gap: 1px; }

        .brand-name {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--white);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-sub {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.45);
            letter-spacing: 0.04em;
            font-family: var(--font-mono);
        }

        .header-controls { display: flex; align-items: center; gap: 1rem; }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            padding: 0.3rem 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            white-space: nowrap;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4caf50;
            flex-shrink: 0;
        }
        .status-dot.loading { background: var(--orange); animation: blink 1s ease infinite; }
        .status-dot.error   { background: var(--red); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .timestamp {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            white-space: nowrap;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.5rem 0 1.25rem;
            flex-wrap: wrap;
        }

        .toolbar-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--gray-400);
            white-space: nowrap;
        }

        .filter-tabs { display: flex; gap: 0.375rem; flex-wrap: wrap; }

        .filter-tab {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            border: 1.5px solid var(--gray-200);
            background: var(--white);
            color: var(--gray-600);
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .filter-tab:hover { border-color: var(--navy-light); color: var(--navy-mid); }
        .filter-tab.active { background: var(--navy-mid); border-color: var(--navy-mid); color: var(--white); }

        .filter-tab .tab-count {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            background: rgba(255,255,255,0.2);
            border-radius: 999px;
            padding: 0 0.35rem;
            line-height: 1.6;
            min-width: 18px;
            text-align: center;
            display: none;
        }

        .filter-tab.active .tab-count,
        .filter-tab .tab-count.has-count { display: inline; }

        .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }

        .btn-refresh {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.45rem 1rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--navy-mid);
            background: var(--navy-mid);
            color: var(--white);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            letter-spacing: 0.02em;
        }

        .btn-refresh:hover:not(:disabled) { background: var(--navy); border-color: var(--navy); }
        .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-refresh .icon { display: inline-block; font-size: 1rem; line-height: 1; }
        .btn-refresh.spinning .icon { animation: spin 1s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner {
            background: #fff3cd;
            border: 1px solid #f0c040;
            color: #7a5000;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            display: none;
        }
        .error-banner.visible { display: block; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
            align-items: start;
        }

        .category-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition), transform var(--transition);
        }

        .category-card:hover { box-shadow: var(--shadow-md); }
        .category-card.hidden { display: none; }

        .card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .card-header-left { flex: 1; min-width: 0; }

        .card-category-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--navy-light);
            margin-bottom: 0.25rem;
        }

        .card-title { font-size: 0.95rem; font-weight: 600; color: var(--gray-800); line-height: 1.3; }
        .card-focus { font-size: 0.72rem; color: var(--gray-400); margin-top: 0.2rem; font-style: italic; }

        .card-badge {
            flex-shrink: 0;
            background: var(--navy);
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 600;
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
            min-width: 28px;
            text-align: center;
            line-height: 1.8;
        }

        .card-badge.loading-badge {
            background: var(--gray-200);
            color: var(--gray-400);
            animation: blink 1.2s ease infinite;
        }

        .article-list {
            max-height: 680px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gray-200) transparent;
        }

        .article-list::-webkit-scrollbar { width: 4px; }
        .article-list::-webkit-scrollbar-track { background: transparent; }
        .article-list::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 999px; }

        .article-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--gray-100);
            transition: background var(--transition);
        }

        .article-item:last-child { border-bottom: none; }
        .article-item:hover { background: var(--gray-100); }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
            flex-wrap: wrap;
        }

        .article-source {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--navy-light);
            letter-spacing: 0.03em;
        }

        .meta-sep { color: var(--gray-200); font-size: 0.65rem; }

        .article-date {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--gray-400);
        }

        .article-title {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.45;
            text-decoration: none;
            margin-bottom: 0.5rem;
            transition: color var(--transition);
        }

        .article-title:hover { color: var(--navy-light); }

        .article-excerpt {
            font-size: 0.78rem;
            color: var(--gray-600);
            line-height: 1.55;
            margin-bottom: 0.6rem;
        }

        .insight-box {
            background: var(--accent);
            border-left: 3px solid var(--navy-light);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            padding: 0.55rem 0.75rem;
            margin-bottom: 0.6rem;
        }

        .insight-label {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--navy-mid);
            margin-bottom: 0.2rem;
        }

        .insight-text { font-size: 0.775rem; color: var(--gray-800); line-height: 1.5; font-style: italic; }
        .insight-loading { font-size: 0.75rem; color: var(--gray-400); font-style: italic; animation: blink 1.5s ease infinite; }

        .article-link {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--navy-light);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: color var(--transition);
        }

        .article-link:hover { color: var(--navy); text-decoration: underline; }

        .skeleton-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--gray-100);
        }

        .skeleton-item:last-child { border-bottom: none; }

        .skeleton-line {
            background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
            background-size: 200% 100%;
            border-radius: var(--radius-sm);
            animation: shimmer 1.4s ease infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-line.s-short  { height: 10px; width: 35%; }
        .skeleton-line.s-title  { height: 14px; width: 90%; margin-bottom: 0.35rem; }
        .skeleton-line.s-title2 { height: 14px; width: 70%; margin-bottom: 0.6rem; }
        .skeleton-line.s-body   { height: 10px; width: 100%; }
        .skeleton-line.s-body2  { height: 10px; width: 85%; }
        .skeleton-line.s-body3  { height: 10px; width: 60%; margin-bottom: 0; }

        .empty-state {
            padding: 2.5rem 1.25rem;
            text-align: center;
            color: var(--gray-400);
            font-size: 0.82rem;
        }

        .empty-state svg {
            width: 32px;
            height: 32px;
            stroke: var(--gray-200);
            margin-bottom: 0.75rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            .page-wrapper { padding: 0 1rem 3rem; }
            .site-header  { margin: 0 -1rem; padding: 0 1rem; }
            .timestamp    { display: none; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .toolbar { gap: 0.5rem; }
        }
    </style>
</head>

        <div class="error-banner" id="error-banner"></div>
        <div class="dashboard-grid" id="dashboard-grid"></div>
