<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIE News Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #00155a; --navy-mid: #002080; --navy-light: #0a2db3;
            --accent: #e8f0fe; --white: #ffffff; --off-white: #f7f8fc;
            --gray-100: #f0f2f8; --gray-200: #e2e6f0; --gray-400: #8892b0;
            --gray-600: #4a5580; --gray-800: #1e2340; --text: #0d1126;
            --red: #e53935; --orange: #f57c00;
            --font-sans: 'IBM Plex Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
            --shadow-sm: 0 1px 3px rgba(0,21,90,0.08), 0 1px 2px rgba(0,21,90,0.06);
            --shadow-md: 0 4px 12px rgba(0,21,90,0.10), 0 2px 4px rgba(0,21,90,0.06);
            --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-sans); background: var(--off-white); color: var(--text); min-height: 100vh; }

        .site-header { background: var(--navy); padding: 0 2rem; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; gap: 2rem; }
        .brand { display: flex; flex-direction: column; gap: 3px; }
        .brand-name { font-family: var(--font-sans); font-weight: 700; font-size: 1.15rem; color: #ffffff; letter-spacing: -0.01em; }
        .brand-sub { font-size: 0.75rem; color: #ffffff; font-weight: 400; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .status-pill { display: flex; align-items: center; gap: 0.4rem; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 0.3rem 0.7rem; font-family: var(--font-mono); font-size: 0.68rem; color: #ffffff; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
        .status-dot.loading { background: var(--orange); animation: blink 1s infinite; }
        .status-dot.error { background: var(--red); }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
        .timestamp { font-family: var(--font-mono); font-size: 0.68rem; color: #ffffff; }

        .page { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }

        .stats-bar { display: none; gap: 2.5rem; padding: 1rem 1.5rem; background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); margin-bottom: 1.25rem; box-shadow: var(--shadow-sm); }
        .stat { display: flex; flex-direction: column; gap: 3px; }
        .stat-label { font-family: var(--font-mono); font-size: 0.65rem; color: var(--gray-400); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--navy); line-height: 1; }

        .source-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .source-pill { font-family: var(--font-mono); font-size: 0.65rem; padding: 0.2rem 0.6rem; border-radius: 999px; border: 1px solid var(--gray-200); color: var(--gray-400); }
        .source-pill.active { border-color: #4caf50; color: #2e7d32; background: #e8f5e9; }
        .source-pill.failed { border-color: var(--red); color: var(--red); background: #fce4ec; }

        .toolbar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-label { font-size: 0.72rem; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.06em; margin-right: 0.25rem; white-space: nowrap; }
        .filter-btn { font-family: var(--font-sans); font-size: 0.8rem; font-weight: 500; padding: 0.4rem 0.9rem; border-radius: 999px; border: 1.5px solid var(--gray-200); background: var(--white); color: var(--gray-600); cursor: pointer; transition: all var(--transition); }
        .filter-btn:hover { border-color: var(--navy-light); color: var(--navy-mid); }
        .filter-btn.active { background: var(--navy-mid); border-color: var(--navy-mid); color: var(--white); }
        .refresh-btn { margin-left: auto; font-family: var(--font-sans); font-size: 0.8rem; font-weight: 600; padding: 0.45rem 1rem; border-radius: var(--radius-sm); border: 1.5px solid var(--navy-mid); background: var(--navy-mid); color: var(--white); cursor: pointer; transition: all var(--transition); display: flex; align-items: center; gap: 0.4rem; }
        .refresh-btn:hover:not(:disabled) { background: var(--navy); border-color: var(--navy); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .refresh-btn .icon { font-size: 1rem; line-height: 1; display: inline-block; }
        .refresh-btn.spinning .icon { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner { display: none; background: #fff3cd; border: 1px solid #f0c040; color: #7a5000; padding: 0.75rem 1rem; border-radius: var(--radius-md); font-size: 0.85rem; margin-bottom: 1rem; }
        .error-banner.visible { display: block; }

        .category-group { margin-bottom: 2.5rem; }
        .category-group.hidden { display: none; }

        .cat-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.25rem; border-radius: var(--radius-md); margin-bottom: 0.75rem; }
        .cat-header.hardware  { background: linear-gradient(135deg, #1a3a6e 0%, #002080 100%); }
        .cat-header.games     { background: linear-gradient(135deg, #1a1a6e 0%, #2d0080 100%); }
        .cat-header.network   { background: linear-gradient(135deg, #003366 0%, #004d99 100%); }
        .cat-header.corporate { background: linear-gradient(135deg, #1a2e5a 0%, #0d1a3a 100%); }
        .cat-header.industry  { background: linear-gradient(135deg, #2a1a5a 0%, #1a0040 100%); }
        .cat-header-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .cat-header-text { flex: 1; min-width: 0; }
        .cat-header-name { font-size: 1rem; font-weight: 700; color: #ffffff; letter-spacing: -0.01em; }
        .cat-header-desc { font-size: 0.72rem; color: #ffffff; margin-top: 1px; }
        .cat-header-badge { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 600; background: rgba(255,255,255,0.15); color: #ffffff; border-radius: 999px; padding: 0.2rem 0.6rem; border: 1px solid rgba(255,255,255,0.2); }

        .article-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 0.625rem; display: flex; gap: 1rem; align-items: flex-start; transition: box-shadow var(--transition), border-color var(--transition); box-shadow: var(--shadow-sm); }
        .article-card:hover { box-shadow: var(--shadow-md); border-color: var(--gray-400); }
        .article-main { flex: 1; min-width: 0; }
        .article-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
        .article-source { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 600; color: var(--navy-light); letter-spacing: 0.03em; }
        .meta-sep { color: var(--gray-200); font-size: 0.65rem; }
        .article-date { font-family: var(--font-mono); font-size: 0.65rem; color: var(--gray-400); }
        .article-title { display: block; font-size: 0.95rem; font-weight: 600; color: var(--text); line-height: 1.45; text-decoration: none; margin-bottom: 0.45rem; transition: color var(--transition); }
        .article-title:hover { color: var(--navy-light); }
        .article-excerpt { font-size: 0.82rem; color: var(--gray-600); line-height: 1.6; margin-bottom: 0.65rem; }
        .article-link { font-family: var(--font-mono); font-size: 0.68rem; color: var(--navy-light); text-decoration: none; font-weight: 600; letter-spacing: 0.02em; transition: color var(--transition); }
        .article-link:hover { color: var(--navy); text-decoration: underline; }

        .score-badge { flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.82rem; font-weight: 700; border: 2px solid; }
        .s10{background:#e8f5e9;color:#1b5e20;border-color:#4caf50}
        .s9 {background:#e8f5e9;color:#2e7d32;border-color:#66bb6a}
        .s8 {background:#f1f8e9;color:#33691e;border-color:#9ccc65}
        .s7 {background:#fffde7;color:#f57f17;border-color:#ffee58}
        .s6 {background:#fff8e1;color:#ff8f00;border-color:#ffc107}
        .slow{background:var(--gray-100);color:var(--gray-400);border-color:var(--gray-200)}

        .skeleton-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 0.625rem; box-shadow: var(--shadow-sm); }
        .skel { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%); background-size: 200% 100%; border-radius: var(--radius-sm); animation: shimmer 1.4s ease infinite; margin-bottom: 0.5rem; }
        @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
        .skel-xs{height:10px;width:25%} .skel-sm{height:14px;width:75%;margin-bottom:.35rem}
        .skel-sm2{height:14px;width:55%;margin-bottom:.7rem} .skel-md{height:10px;width:100%}
        .skel-md2{height:10px;width:88%} .skel-md3{height:10px;width:65%;margin-bottom:0}

        .empty-state { padding: 2.5rem; text-align: center; color: var(--gray-400); font-size: 0.85rem; background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); }

        @media (max-width: 768px) {
            .site-header { padding: 0 1rem; }
            .page { padding: 1rem 1rem 3rem; }
            .timestamp { display: none; }
            .score-badge { display: none; }
            .source-pills { display: none; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <div class="brand">
            <span class="brand-name">Sony Interactive Entertainment — News Dashboard</span>
            <span class="brand-sub">SIE news feed · live headlines</span>
        </div>
        <div class="header-right">
            <span class="timestamp" id="timestamp"></span>
            <div class="status-pill">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Ready</span>
            </div>
        </div>
    </div>
</header>

<div class="page">
    <div class="stats-bar" id="stats-bar">
        <div class="stat"><span class="stat-label">Articles found</span><span class="stat-value" id="stat-total">—</span></div>
        <div class="stat"><span class="stat-label">Relevant (6–10)</span><span class="stat-value" id="stat-relevant">—</span></div>
        <div class="stat"><span class="stat-label">Avg. score</span><span class="stat-value" id="stat-avg">—</span></div>
    </div>

    <div class="source-pills" id="source-pills"></div>

    <div class="toolbar">
        <span class="filter-label">Filter:</span>
        <button class="filter-btn active" data-filter="">All relevant</button>
        <button class="filter-btn" data-filter="hardware">Hardware</button>
        <button class="filter-btn" data-filter="games">Games</button>
        <button class="filter-btn" data-filter="network">Network / PS+</button>
        <button class="filter-btn" data-filter="corporate">Corporate</button>
        <button class="filter-btn" data-filter="industry">Industry</button>
        <button class="refresh-btn" id="refresh-btn"><span class="icon">⟳</span> Refresh feed</button>
    </div>

    <div class="error-banner" id="error-banner"></div>
    <div id="feed"></div>
</div>

<script>
const CONFIG = {
    gnews:    { key: '7c911a322807e7fc9b37994748abe439', enabled: true },
    guardian: { key: 'test', enabled: true },
    rss:      { enabled: true }
};

const CACHE_KEY = 'sie_v9_cache';
const CACHE_TTL = 30 * 60 * 1000;
const MIN_SCORE = 6;

const CATEGORIES = {
    hardware:  { label: 'Hardware',      desc: 'Console Hardware, Devices & Technology',   icon: '🎮' },
    games:     { label: 'Games',         desc: 'SIE Exclusive Titles, Studios & Launches', icon: '🕹️' },
    network:   { label: 'Network / PS+', desc: 'PlayStation Plus & Online Services',       icon: '🌐' },
    corporate: { label: 'Corporate',     desc: 'Earnings, M&A, Legal & Leadership',        icon: '📊' },
    industry:  { label: 'Industry',      desc: 'Gaming Industry & Competitive Landscape',  icon: '🏭' }
};

const SOURCES = [
    {
        id: 'gnews', label: 'GNews',
        fetch: async () => {
            if(!CONFIG.gnews.enabled) return [];
            const queries = ['Sony PlayStation','PlayStation 5 PS5','Sony gaming earnings','PlayStation Plus','Sony Bungie','PlayStation 6','Xbox gaming','Nintendo Switch'];
            const results = await Promise.allSettled(queries.map(q =>
                fetchJson(`https://gnews.io/api/v4/search?q=${encodeURIComponent(q)}&lang=en&max=10&apikey=${CONFIG.gnews.key}`)
            ));
            return results.flatMap(r => r.status==='fulfilled' ? (r.value?.articles||[]).map(a => ({
                title: a.title, source: a.source?.name||'GNews',
                date: formatDate(a.publishedAt), excerpt: a.description||'', url: a.url
            })) : []);
        }
    },
    {
        id: 'guardian', label: 'The Guardian',
        fetch: async () => {
            if(!CONFIG.guardian.enabled) return [];
            const queries = ['Sony PlayStation','PlayStation gaming','Sony Interactive Entertainment','Xbox gaming industry','Nintendo gaming'];
            const results = await Promise.allSettled(queries.map(q =>
                fetchJson(`https://content.guardianapis.com/search?q=${encodeURIComponent(q)}&api-key=${CONFIG.guardian.key}&page-size=10&show-fields=trailText&order-by=newest`)
            ));
            return results.flatMap(r => r.status==='fulfilled' ? (r.value?.response?.results||[]).map(a => ({
                title: a.webTitle, source: 'The Guardian',
                date: formatDate(a.webPublicationDate), excerpt: a.fields?.trailText||'', url: a.webUrl
            })) : []);
        }
    },
    {
        id: 'rss', label: 'RSS Feeds',
        fetch: async () => {
            if(!CONFIG.rss.enabled) return [];
            const feeds = [
                { url: 'https://www.gamesindustry.biz/feed',    source: 'GamesIndustry.biz' },
                { url: 'https://www.eurogamer.net/feed',         source: 'Eurogamer' },
                { url: 'https://www.vgc.com/feed',               source: 'VGC' },
                { url: 'https://kotaku.com/rss',                 source: 'Kotaku' },
                { url: 'https://www.theverge.com/rss/index.xml', source: 'The Verge' },
                { url: 'https://arstechnica.com/feed/',          source: 'Ars Technica' }
            ];
            const results = await Promise.allSettled(feeds.map(f => fetchRSS(f.url, f.source)));
            return results.flatMap(r => r.status==='fulfilled' ? r.value : []);
        }
    }
];

const withTimeout = (url, opts={}, ms=12000) => {
    const c=new AbortController(), t=setTimeout(()=>c.abort(), ms);
    return fetch(url, {...opts, signal:c.signal}).then(r=>{clearTimeout(t);return r;}).catch(e=>{clearTimeout(t);throw e;});
};

const fetchJson = async url => {
    try {
        const r = await withTimeout(url, {}, 12000);
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        return await r.json();
    } catch(e) { console.warn(`fetchJson failed: ${e.message}`); return null; }
};

const fetchRSS = async (feedUrl, sourceName) => {
    try {
        const r = await withTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`, {}, 12000);
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const d = await r.json();
        if(!d.contents) return [];
        const doc = new DOMParser().parseFromString(d.contents, 'text/xml');
        const items = [...doc.querySelectorAll('item, entry')];
        return items.slice(0,15).map(item => {
            const get = tag => item.querySelector(tag)?.textContent?.trim()||'';
            return {
                title:   get('title'),
                source:  sourceName,
                date:    formatDate(get('pubDate')||get('published')||get('updated')),
                excerpt: (get('description')||get('summary')||get('content')).replace(/<[^>]+>/g,'').substring(0,300),
                url:     get('link')||item.querySelector('link')?.getAttribute('href')||''
            };
        }).filter(a => a.title && a.url);
    } catch(e) { console.warn(`RSS failed for ${sourceName}: ${e.message}`); return []; }
};

const fingerprint = t => {
    const stop = new Set(['a','an','the','and','or','but','in','on','at','to','for','of','with','by','from','is','are','was','were','has','have','had','it','this','that','as','be','been','will','would','could','should','may','might','about','after','before','into','over','then','when','where','how','all','both','each','more','most','other','some','no','not','only','same','so','than','too','very','just','also','what','know','says','said']);
    return new Set(t.toLowerCase().replace(/[^a-z0-9 ]/g,'').split(' ').filter(w=>w.length>3&&!stop.has(w)));
};
const extractAmts = t => (t.match(/\$[\d]+(?:\.[\d]+)?(?:m|b|million|billion)?/gi)||[]).map(n=>n.replace(/[mb]/i,'').toLowerCase());
const isSameStory = (a,b) => {
    const amA=extractAmts(a),amB=extractAmts(b);
    if(amA.length&&amB.length&&amA.some(x=>amB.includes(x))) return true;
    const wA=fingerprint(a),wB=fingerprint(b);
    if(!wA.size||!wB.size) return false;
    return [...wA].filter(w=>wB.has(w)).length/Math.min(wA.size,wB.size)>=0.45;
};

const COMPETITOR_TERMS = ['xbox','microsoft gaming','game pass','activision','bethesda','nintendo','switch 2','nintendo direct','mario','zelda','steam deck','valve','epic games','epic store','take-two','rockstar','ea games','electronic arts','ubisoft','square enix','capcom','sega','bandai namco','konami','summer game fest','the game awards','gdc'];
const hasCompetitor = t => COMPETITOR_TERMS.some(k=>t.includes(k));

const keywordScore = a => {
    const t = `${a.title} ${a.excerpt}`.toLowerCase();
    const s10 = ['impairment charge','write-down','writedown','write down','acquisition','acquires','acquired','merger','takeover','buyout','earnings','quarterly results','financial results','annual results','operating loss','net income','operating income','revenue miss','revenue beat','layoff','layoffs','job cuts','redundancies','restructuring','class action','antitrust','settlement','regulatory fine','lawsuit','ceo','chief executive','cfo','chief financial','appointed','steps down','resigns','ps5 price','playstation price','console price','price increase','price cut','ps6','playstation 6','next gen console','studio closure','studio shut','game cancelled','game shutdown','bungie impairment','concord shutdown','sony interactive entertainment','investor','shareholder','fiscal year','fiscal quarter','share price'];
    if(s10.some(k=>t.includes(k))) return 10;
    const s8 = ['game pass price','game pass subscribers','xbox game pass','nintendo switch 2','switch 2 launch','switch 2 sales','ps plus subscribers','ps+ subscribers','playstation subscribers','psn outage','psn down','ps5 sales','ps5 units','console sales','hardware sales','sony revenue','sony profit','sony fiscal','sony earnings','playstation market','gaming market share','microsoft gaming','naughty dog','insomniac','guerrilla games','santa monica studio','housemarque','bluepoint','firesprite','bungie','sony acquisition','sony studio','sony partnership','playstation exclusive','ps5 exclusive','sony exclusive'];
    if(s8.some(k=>t.includes(k))) return 8;
    const s6 = ['god of war','spider-man','horizon','the last of us','ghost of tsushima','gran turismo','astro bot','helldivers','ratchet','returnal','game launch','game release','game announcement','game reveal','ps plus games','playstation plus games','dualsense','psvr','ps5 pro','ps5 slim','playstation store','gaming industry','video game industry','gaming market','nintendo','xbox','steam','epic games','take-two','ubisoft','game developer','game publisher','gaming revenue'];
    if(s6.some(k=>t.includes(k))) return 6;
    if(['sony','playstation','ps5','ps4','psn','ps plus'].some(k=>t.includes(k))) return 4;
    return 2;
};

const categorise = a => {
    const t = `${a.title} ${a.excerpt}`.toLowerCase();
    if(hasCompetitor(t)) return 'industry';
    const corp = ['earnings','revenue','profit','acquisition','acquires','acquired','merger','layoff','layoffs','job cuts','ceo','chief executive','cfo','lawsuit','settlement','impairment','write-down','restructuring','fiscal','shareholder','investor','bungie impairment','studio closure','studio shut','game cancelled','game shutdown'];
    if(corp.some(k=>t.includes(k))) return 'corporate';
    if(['playstation plus','ps plus','psn outage','psn down','playstation network','playstation subscription','ps+ subscribers'].some(k=>t.includes(k))) return 'network';
    const game = ['exclusive game','ps5 exclusive','playstation exclusive','sony exclusive','first-party','game launch','game release','game reveal','game announcement','game download','free game','ps store','playstation store game','god of war','spider-man','horizon','the last of us','ghost of tsushima','astro bot','helldivers','gran turismo','ratchet','returnal','naughty dog','insomniac','guerrilla','housemarque','bluepoint','saros','playstation studios'];
    if(game.some(k=>t.includes(k))) return 'games';
    if(['ps5 pro','ps5 slim','dualsense','psvr','ps6 specs','ps6 hardware','next gen console','console price','hardware sales','console sales'].some(k=>t.includes(k))) return 'hardware';
    if(['ps6','playstation 6','ps5'].some(k=>t.includes(k))) return 'hardware';
    return 'games';
};

const saveCache = d => { try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(),data:d})); } catch(e){} };
const loadCache = () => {
    try {
        const r=sessionStorage.getItem(CACHE_KEY); if(!r) return null;
        const {ts,data}=JSON.parse(r);
        return Date.now()-ts>CACHE_TTL?null:data;
    } catch(e){return null;}
};

let allArticles=[], currentFilter='';
const el = id => document.getElementById(id);
const setStatus = (txt,type='ready') => { el('status-text').textContent=txt; el('status-dot').className=`status-dot${type==='loading'?' loading':type==='error'?' error':''}`; };
const showError = msg => { const e=el('error-banner'); e.textContent=msg; e.classList.toggle('visible',!!msg); };
const formatDate = ds => {
    if(!ds) return '';
    try {
        const d=new Date(ds),now=new Date(),m=Math.floor((now-d)/60000),h=Math.floor(m/60),day=Math.floor(h/24);
        if(isNaN(m)) return '';
        if(m<1) return 'just now'; if(m<60) return `${m}m ago`;
        if(h<24) return `${h}h ago`; if(day<7) return `${day}d ago`;
        return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    } catch(e){return '';}
};
const scoreClass = s => s>=10?'s10':s>=9?'s9':s>=8?'s8':s>=7?'s7':s>=6?'s6':'slow';

const updateStats = articles => {
    const rel=articles.filter(a=>a.score>=MIN_SCORE), scores=rel.map(a=>a.score);
    const avg=scores.length?(scores.reduce((s,x)=>s+x,0)/scores.length).toFixed(1):'—';
    el('stat-total').textContent=articles.length; el('stat-relevant').textContent=rel.length;
    el('stat-avg').textContent=avg; el('stats-bar').style.display='flex';
};

const updateSourcePills = statuses => {
    el('source-pills').innerHTML = statuses.map(s =>
        `<span class="source-pill ${s.ok?'active':'failed'}">${s.label}: ${s.ok?s.count+' articles':'unavailable'}</span>`
    ).join('');
};

const renderSkeletons = () => {
    el('feed').innerHTML=[1,2,3,4,5].map(()=>`
        <div class="skeleton-card">
            <div class="skel skel-xs"></div><div class="skel skel-sm"></div>
            <div class="skel skel-sm2"></div><div class="skel skel-md"></div>
            <div class="skel skel-md2"></div><div class="skel skel-md3"></div>
        </div>`).join('');
};

const renderFeed = () => {
    const feed=el('feed');
    const relevant=allArticles.filter(a=>a.score>=MIN_SCORE);
    if(!relevant.length){ feed.innerHTML='<div class="empty-state">No relevant articles found. Try refreshing.</div>'; return; }
    const grouped={};
    Object.keys(CATEGORIES).forEach(k=>grouped[k]=[]);
    relevant.forEach(a=>{ if(grouped[a.category]) grouped[a.category].push(a); });
    feed.innerHTML=Object.entries(CATEGORIES).map(([key,cat])=>{
        const articles=grouped[key]||[];
        const hidden=currentFilter&&currentFilter!==key?' hidden':'';
        const body=articles.length===0
            ?'<div class="empty-state">No articles in this category</div>'
            :articles.map(a=>`
                <div class="article-card">
                    <div class="article-main">
                        <div class="article-meta">
                            <span class="article-source">${a.source}</span>
                            <span class="meta-sep">·</span>
                            <span class="article-date">${a.date}</span>
                        </div>
                        <a class="article-title" href="${a.url}" target="_blank" rel="noopener noreferrer">${a.title}</a>
                        <p class="article-excerpt">${a.excerpt.substring(0,200)}${a.excerpt.length>200?'…':''}</p>
                        <a class="article-link" href="${a.url}" target="_blank" rel="noopener noreferrer">Read full article →</a>
                    </div>
                    <div class="score-badge ${scoreClass(a.score)}">${a.score}</div>
                </div>`).join('');
        return `
            <div class="category-group${hidden}" data-category="${key}">
                <div class="cat-header ${key}">
                    <div class="cat-header-icon">${cat.icon}</div>
                    <div class="cat-header-text">
                        <div class="cat-header-name">${cat.label}</div>
                        <div class="cat-header-desc">${cat.desc}</div>
                    </div>
                    <div class="cat-header-badge">${articles.length} article${articles.length!==1?'s':''}</div>
                </div>
                ${body}
            </div>`;
    }).join('');
};

const applyFilter = f => {
    currentFilter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
    document.querySelectorAll('.category-group').forEach(g=>g.classList.toggle('hidden',f!==''&&g.dataset.category!==f));
};

const refresh = async (force=false) => {
    const btn=el('refresh-btn');
    btn.disabled=true; btn.classList.add('spinning');
    setStatus('Fetching…','loading'); showError('');

    if(!force){
        const cached=loadCache();
        if(cached){ allArticles=cached; updateStats(allArticles); renderFeed(); applyFilter(currentFilter);
            el('timestamp').textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
            setStatus('Ready','ready'); btn.disabled=false; btn.classList.remove('spinning'); return; }
    }

    try {
        renderSkeletons();
        const sourceResults=await Promise.allSettled(SOURCES.map(s=>s.fetch()));
        updateSourcePills(SOURCES.map((s,i)=>({
            label: s.label,
            ok:    sourceResults[i].status==='fulfilled'&&sourceResults[i].value.length>0,
            count: sourceResults[i].status==='fulfilled'?sourceResults[i].value.length:0
        })));

        const seenUrls=new Set(),seenTitles=[],pool=[];
        sourceResults.forEach(r=>{
            if(r.status!=='fulfilled') return;
            for(const a of r.value){
                if(!a.url||!a.title||seenUrls.has(a.url)) continue;
                if(seenTitles.some(t=>isSameStory(t,a.title))) continue;
                seenUrls.add(a.url); seenTitles.push(a.title); pool.push(a);
            }
        });

        console.log(`[Dashboard] ${pool.length} articles after dedup`);
        if(!pool.length){ showError('All news sources unavailable. Check F12 → Console for details.'); setStatus('Error','error'); btn.disabled=false; btn.classList.remove('spinning'); return; }

        allArticles=pool.map(a=>({...a,score:keywordScore(a),category:categorise(a)})).sort((a,b)=>b.score-a.score);
        updateStats(allArticles); renderFeed(); applyFilter(currentFilter); saveCache(allArticles);
        el('timestamp').textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
        setStatus('Ready','ready');
    } catch(err){
        console.error('[Dashboard]',err); showError(`Error: ${err.message}`); setStatus('Error','error');
    } finally { btn.disabled=false; btn.classList.remove('spinning'); }
};

window.addEventListener('DOMContentLoaded',()=>{
    el('refresh-btn').addEventListener('click',()=>refresh(true));
    document.querySelector('.toolbar').addEventListener('click',e=>{
        const btn=e.target.closest('.filter-btn'); if(btn) applyFilter(btn.dataset.filter);
    });
    refresh(false);
});
setInterval(()=>refresh(true),30*60*1000);
</script>
</body>
</html>
