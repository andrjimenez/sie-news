<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony Interactive Entertainment - News Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 3px solid #000080;
        }
        .header h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.3rem; color: #000080; letter-spacing: -0.5px; }
        .header p { color: #666666; font-size: 1rem; margin-bottom: 0.5rem; }
        .header .subtitle { color: #999999; font-size: 0.9rem; font-style: italic; }
        .last-updated { font-size: 0.85rem; color: #999999; margin-top: 0.5rem; }
        .controls { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; justify-content: center; }
        .control-group { display: flex; gap: 0.75rem; align-items: center; }
        .control-group label { font-size: 0.95rem; color: #333333; font-weight: 500; }
        select, button {
            padding: 0.6rem 1rem; font-size: 0.9rem; border: 1.5px solid #000080;
            border-radius: 4px; background: #ffffff; color: #000080; cursor: pointer;
            font-weight: 500; transition: all 0.2s ease;
        }
        select:hover, button:hover { background: #000080; color: #ffffff; }
        select:focus, button:focus { outline: none; box-shadow: 0 0 0 3px rgba(0,0,128,0.1); }
        button:active { transform: scale(0.98); }
        .status { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #666666; margin-left: auto; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; }
        .status-dot.loading { background: #FF9800; animation: pulse 1s infinite; }
        .status-dot.error { background: #F44336; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; }
        .category-card { background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 4px; overflow: hidden; transition: all 0.3s ease; }
        .category-card:hover { border-color: #000080; box-shadow: 0 4px 12px rgba(0,0,128,0.1); transform: translateY(-2px); }
        .category-header { background: #000080; color: #ffffff; padding: 1.2rem; }
        .category-header h2 { font-size: 1.1rem; font-weight: 600; margin: 0 0 0.4rem; letter-spacing: -0.3px; }
        .category-header .unit-description { font-size: 0.8rem; opacity: 0.9; margin: 0; }
        .category-header .strategic-focus { font-size: 0.75rem; opacity: 0.8; margin-top: 0.4rem; font-style: italic; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 0.4rem; }
        .article-list { padding: 1.2rem; max-height: 700px; overflow-y: auto; }
        .article { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; transition: all 0.2s ease; }
        .article:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .article:hover { padding-left: 0.5rem; border-left: 3px solid #000080; }
        .article-title { font-size: 0.95rem; font-weight: 600; color: #000080; margin-bottom: 0.5rem; line-height: 1.4; text-decoration: none; display: block; }
        .article-title:hover { color: #0000b3; text-decoration: underline; }
        .article-meta { font-size: 0.75rem; color: #666666; margin-bottom: 0.6rem; }
        .article-source { color: #000080; font-weight: 600; }
        .article-excerpt { font-size: 0.85rem; color: #444444; line-height: 1.5; margin-bottom: 0.75rem; }
        .business-impact { background: #f0f4ff; border-left: 3px solid #000080; padding: 0.75rem; border-radius: 2px; margin-bottom: 0.75rem; font-size: 0.8rem; line-height: 1.6; }
        .business-impact strong { color: #000080; display: block; margin-bottom: 0.3rem; }
        .business-impact .impact-text { color: #333333; font-style: italic; }
        .article-link { font-size: 0.8rem; color: #000080; text-decoration: none; font-weight: 600; }
        .article-link:hover { color: #0000b3; text-decoration: underline; }
        .empty { padding: 2rem; text-align: center; color: #999999; font-size: 0.9rem; }
        .error-message { background: #FFF3CD; border: 1px solid #FFE082; color: #856404; padding: 1rem; border-radius: 4px; margin-bottom: 1.5rem; font-size: 0.9rem; line-height: 1.6; }
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .header h1 { font-size: 1.5rem; }
            .category-grid { grid-template-columns: 1fr; gap: 1rem; }
            .status { margin-left: 0; margin-top: 0.5rem; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sony Interactive Entertainment</h1>
            <p>News Dashboard</p>
            <div class="subtitle">Latest news by category</div>
            <div class="last-updated">Last updated: <span id="timestamp">Never</span></div>
        </div>
        <div class="controls">
            <div class="control-group">
                <label for="filter">Filter by Category:</label>
                <select id="filter">
                    <option value="">All categories</option>
                    <option value="hardware">Hardware</option>
                    <option value="games">Games</option>
                    <option value="network">Network & PS+</option>
                    <option value="corporate">Corporate</option>
                </select>
            </div>
            <button id="refresh-btn" onclick="refreshNews()">⟳ Refresh</button>
            <div class="status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Ready</span>
            </div>
        </div>
        <div id="error-container"></div>
        <div class="category-grid" id="articles"></div>
    </div>

    <script>
        const NEWS_API_KEY = '49f62eab61c1478086ac707012433080';
        const PROXIES = [
            'https://api.allorigins.win/get?url=',
            'https://corsproxy.io/?'
        ];
        let allArticles = {};

        const businessUnits = {
            hardware: {
                label: 'Hardware',
                description: 'Console Hardware, Devices & Technology',
                strategicFocus: 'PS5, PS5 Pro, console lifecycle, technical innovation'
            },
            games: {
                label: 'Games',
                description: 'Game Releases, Studios & Content',
                strategicFocus: 'Exclusive titles, studio news, game launches, gameplay'
            },
            network: {
                label: 'Network & PS+',
                description: 'PlayStation Plus, Online Services & Subscriptions',
                strategicFocus: 'PS+ tiers, subscribers, PSN, online services'
            },
            corporate: {
                label: 'Corporate',
                description: 'Financial Performance, M&A, Legal & Strategy',
                strategicFocus: 'Earnings, acquisitions, legal, partnerships, leadership'
            }
        };

        const CORPORATE_SIGNALS = [
            'earnings', 'revenue', 'profit', 'loss', 'financial results', 'quarterly',
            'acquisition', 'acquires', 'acquired', 'merger', 'takeover',
            'layoff', 'layoffs', 'redundan', 'restructur', 'job cut',
            'settlement', 'lawsuit', 'legal', 'court', 'fine', 'penalty', 'regulator', 'antitrust',
            'impairment', 'write-down', 'writedown', 'write off',
            'ceo', 'chief executive', 'president', 'executive', 'appoint', 'resign', 'leadership',
            'investor', 'shareholder', 'market share', 'stock price', 'ipo',
            'partnership', 'deal', 'agreement', 'collaborat',
            'bungie', 'haven studios', 'insomniac', 'naughty dog', 'santa monica'
        ];

        const HARDWARE_SIGNALS = [
            'ps5 pro', 'playstation 5', 'ps5', 'dualsense', 'console hardware',
            'playstation hardware', 'next-gen console', 'sony console',
            'psvr', 'playstation vr', 'specs', 'teraflop', 'ssd speed'
        ];

        const NETWORK_SIGNALS = [
            'playstation plus', 'ps plus', 'psn', 'playstation network',
            'ps now', 'playstation now', 'ps+ subscribers', 'cloud gaming playstation',
            'online service playstation', 'playstation subscription'
        ];

        const GAMES_SIGNALS = [
            'game', 'games', 'title', 'exclusive', 'dlc', 'expansion',
            'sequel', 'gameplay', 'release date', 'game launch', 'game studio',
            'developer', 'game trailer', 'game preview', 'game review',
            'playstation game', 'sony game'
        ];

        function assignCategory(article) {
            const text = `${article.title} ${article.description || ''}`.toLowerCase();
            if (CORPORATE_SIGNALS.some(kw => text.includes(kw))) return 'corporate';
            if (HARDWARE_SIGNALS.some(kw => text.includes(kw))) return 'hardware';
            if (NETWORK_SIGNALS.some(kw => text.includes(kw))) return 'network';
            if (GAMES_SIGNALS.some(kw => text.includes(kw))) return 'games';
            return null;
        }

        const searchQueries = [
            { category: 'corporate', queries: [
                'Sony Interactive Entertainment financial earnings',
                'Sony PlayStation acquisition lawsuit settlement',
                'Sony gaming impairment layoff restructure bungie'
            ]},
            { category: 'hardware', queries: [
                'PlayStation 5 PS5 hardware console',
                'PS5 Pro Sony specs performance',
                'PlayStation console sales hardware'
            ]},
            { category: 'games', queries: [
                'PlayStation exclusive game release',
                'Sony PlayStation game announcement launch',
                'PlayStation studio game title'
            ]},
            { category: 'network', queries: [
                'PlayStation Plus PS+ subscription Sony',
                'PlayStation Network PSN online service',
                'PS Plus subscribers tier Sony'
            ]}
        ];

        const SONY_TERMS = ['sony', 'playstation', 'ps5', 'ps4', 'psn', 'sie', 'ps plus', 'playstation plus', 'bungie', 'insomniac', 'naughty dog'];

        function isSonyRelevant(article) {
            const text = `${article.title} ${article.description || ''}`.toLowerCase();
            return SONY_TERMS.some(term => text.includes(term));
        }

        function fingerprintTitle(title) {
            const stopWords = new Set(['a','an','the','and','or','but','in','on','at','to','for','of','with','by','from','is','are','was','were','has','have','had','its','it','this','that','as','be','been','will','would','could','should','may','might','about','after','before','into','over','under','then','when','where','how','all','both','each','more','most','other','some','such','no','not','only','same','so','than','too','very','just','also','what','know','says','said']);
            return new Set(
                title.toLowerCase()
                    .replace(/[^a-z0-9 ]/g, '')
                    .split(' ')
                    .filter(w => w.length > 3 && !stopWords.has(w))
            );
        }

        function isSameStory(titleA, titleB) {
            const wordsA = fingerprintTitle(titleA);
            const wordsB = fingerprintTitle(titleB);
            if (wordsA.size === 0 || wordsB.size === 0) return false;
            const overlap = [...wordsA].filter(w => wordsB.has(w)).length;
            return overlap / Math.min(wordsA.size, wordsB.size) >= 0.5;
        }

        function generateInsight(article) {
            const text = `${article.title} ${article.excerpt}`.toLowerCase();
            const insightMap = [
                { keywords: ['settlement', 'fine', 'penalty', 'lawsuit', 'antitrust', 'legal', 'court'], insight: 'Legal and regulatory exposure creates reputational risk and can constrain SIE\'s ability to pursue future M&A.' },
                { keywords: ['impairment', 'write-down', 'writedown', 'write off'], insight: 'An impairment charge signals that the acquired asset has underperformed expectations, raising questions about SIE\'s M&A due diligence process.' },
                { keywords: ['bungie'], insight: 'Bungie\'s performance is a bellwether for SIE\'s live service strategy — underperformance here puts the broader services growth thesis at risk.' },
                { keywords: ['layoff', 'layoffs', 'restructur', 'job cut', 'redundan'], insight: 'Workforce reductions signal a reset in investment priorities and may delay upcoming title or service launches.' },
                { keywords: ['acquisition', 'acquires', 'acquired', 'merger'], insight: 'Studio acquisitions expand SIE\'s first-party pipeline but require disciplined integration to avoid the value destruction seen in other gaming M&A.' },
                { keywords: ['earnings', 'revenue', 'profit', 'quarterly', 'financial results'], insight: 'Financial results reveal the health of SIE\'s hardware, software, and services mix — the key indicator for strategic resource allocation.' },
                { keywords: ['ceo', 'chief executive', 'president', 'leadership', 'appoint', 'resign'], insight: 'Leadership transitions introduce strategic uncertainty and may shift platform, content, or services investment priorities.' },
                { keywords: ['partnership', 'deal', 'agreement', 'collaborat'], insight: 'Strategic partnerships can fill content or technology gaps without the full capital commitment of an acquisition.' },
                { keywords: ['price', 'cut', 'discount', 'cheaper'], insight: 'A price reduction could accelerate PS5 adoption and expand the addressable market ahead of the next console generation.' },
                { keywords: ['sales', 'units', 'shipped', 'sold'], insight: 'Hardware unit sales signal install base growth, which directly underpins software attach and services subscription revenue.' },
                { keywords: ['ps5 pro', 'hardware refresh', 'new model', 'revision'], insight: 'A mid-cycle hardware refresh can re-energize the install base and create a new attach rate opportunity for premium titles.' },
                { keywords: ['exclusive', 'first-party', 'first party'], insight: 'Exclusive content is SIE\'s primary differentiator — it drives console preference and reduces platform churn.' },
                { keywords: ['delay', 'delayed', 'postponed'], insight: 'Title delays create release calendar gaps that can suppress hardware sales and slow subscriber acquisition.' },
                { keywords: ['launch', 'release', 'released', 'out now'], insight: 'New title launches are short-term drivers of hardware attach rates and PS+ subscriber spikes.' },
                { keywords: ['playstation plus', 'ps plus', 'subscriber', 'subscription', 'ps+'], insight: 'PS+ subscriber growth and tier mix are SIE\'s key recurring revenue indicators and a measure of platform stickiness.' },
                { keywords: ['psn', 'outage', 'server', 'network down'], insight: 'Service disruptions erode user trust and increase churn risk, particularly among higher-paying PS+ tier subscribers.' },
                { keywords: ['cloud', 'streaming', 'remote play'], insight: 'Cloud gaming expands SIE\'s serviceable market beyond console owners and is a direct competitive response to Xbox Game Pass.' },
                { keywords: ['pc', 'steam', 'windows', 'port'], insight: 'PC ports monetize existing IP beyond the console base, though release timing must be managed to protect hardware sales incentives.' }
            ];
            for (const entry of insightMap) {
                if (entry.keywords.some(kw => text.includes(kw))) return entry.insight;
            }
            return null;
        }

        function setStatus(text, type = 'ready') {
            document.getElementById('status-text').textContent = text;
            document.getElementById('status-dot').className = 'status-dot ' + (type === 'loading' ? 'loading' : type === 'error' ? 'error' : '');
        }
        function showError(msg) { document.getElementById('error-container').innerHTML = `<div class="error-message">${msg}</div>`; }
        function clearMessages() { document.getElementById('error-container').innerHTML = ''; }
        function updateTimestamp() {
            document.getElementById('timestamp').textContent = new Date().toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        async function fetchWithProxy(apiUrl, proxyIndex = 0) {
            if (proxyIndex >= PROXIES.length) throw new Error('All proxies failed');
            try {
                const proxyUrl = PROXIES[proxyIndex] + encodeURIComponent(apiUrl);
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data.contents ? JSON.parse(data.contents) : data;
            } catch (e) {
                console.warn(`Proxy ${proxyIndex} failed, trying next...`, e);
                return fetchWithProxy(apiUrl, proxyIndex + 1);
            }
        }

        function formatDate(dateString) {
            try {
                const date = new Date(dateString);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMins / 60);
                const diffDays = Math.floor(diffHours / 24);
                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                if (diffDays < 7) return `${diffDays}d ago`;
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            } catch (e) { return 'Recently'; }
        }

        async function refreshNews() {
            clearMessages();
            setStatus('Fetching articles...', 'loading');
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;

            try {
                const seenUrls = new Set();
                const seenTitles = [];
                const rawPool = [];

                for (const item of searchQueries) {
                    for (const query of item.queries) {
                        try {
                            const apiUrl = `https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&sortBy=publishedAt&language=en&pageSize=100&apiKey=${NEWS_API_KEY}`;
                            const apiData = await fetchWithProxy(apiUrl);
                            if (apiData.status === 'error') { console.error('API error:', apiData.message); continue; }
                            if (apiData.articles) {
                                for (const a of apiData.articles) {
                                    if (!a.url || seenUrls.has(a.url)) continue;
                                    if (!isSonyRelevant(a)) continue;
                                    if (seenTitles.some(t => isSameStory(t, a.title))) continue;
                                    seenUrls.add(a.url);
                                    seenTitles.push(a.title);
                                    rawPool.push(a);
                                }
                            }
                        } catch (e) { console.error(`Query "${query}" failed:`, e); }
                    }
                }

                const categorized = { hardware: [], games: [], network: [], corporate: [] };

                for (const a of rawPool) {
                    const category = assignCategory(a);
                    if (category && categorized[category].length < 8) {
                        categorized[category].push({
                            title: a.title,
                            source: a.source.name,
                            date: formatDate(a.publishedAt),
                            excerpt: a.description || 'No description available',
                            url: a.url,
                            whyItMatters: generateInsight({ title: a.title, excerpt: a.description || '' })
                        });
                    }
                }

                const hasArticles = Object.values(categorized).some(arr => arr.length > 0);
                if (!hasArticles) {
                    showError('No articles found. Please try refreshing again.');
                    setStatus('No articles', 'error');
                    btn.disabled = false;
                    return;
                }

                allArticles = categorized;
                renderArticles(document.getElementById('filter').value);
                updateTimestamp();
                setStatus('Updated', 'ready');

            } catch (error) {
                console.error('Error:', error);
                showError(`Error loading news: ${error.message}. Please try again.`);
                setStatus('Error', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function renderArticles(filter = '') {
            const container = document.getElementById('articles');
            container.innerHTML = '';
            const unitKeys = ['hardware', 'games', 'network', 'corporate'];
            const toShow = filter ? unitKeys.filter(k => k === filter) : unitKeys;

            toShow.forEach(key => {
                const unit = businessUnits[key];
                const articles = allArticles[key] || [];
                const card = document.createElement('div');
                card.className = 'category-card';

                const headerEl = document.createElement('div');
                headerEl.className = 'category-header';
                headerEl.innerHTML = `
                    <h2>${unit.label}</h2>
                    <p class="unit-description">${unit.description}</p>
                    <p class="strategic-focus">${unit.strategicFocus}</p>
                `;
                card.appendChild(headerEl);

                const list = document.createElement('div');
                list.className = 'article-list';

                if (articles.length === 0) {
                    list.innerHTML = '<div class="empty">No articles found for this category</div>';
                } else {
                    articles.forEach(article => {
                        const el = document.createElement('div');
                        el.className = 'article';
                        el.innerHTML = `
                            <a class="article-title" href="${article.url}" target="_blank" rel="noopener noreferrer">${article.title}</a>
                            <div class="article-meta">
                                <span class="article-source">${article.source}</span> · ${article.date}
                            </div>
                            <div class="article-excerpt">${article.excerpt.substring(0, 150)}${article.excerpt.length > 150 ? '...' : ''}</div>
                            ${article.whyItMatters ? `
                            <div class="business-impact">
                                <strong>Why it Matters:</strong>
                                <span class="impact-text">${article.whyItMatters}</span>
                            </div>` : ''}
                            <a href="${article.url}" target="_blank" rel="noopener noreferrer" class="article-link">Read full article →</a>
                        `;
                        list.appendChild(el);
                    });
                }

                card.appendChild(list);
                container.appendChild(card);
            });
        }

        document.getElementById('filter').addEventListener('change', e => renderArticles(e.target.value));
        refreshNews();
        setInterval(refreshNews, 30 * 60 * 1000);
    </script>
</body>
</html>
